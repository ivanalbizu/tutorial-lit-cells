<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutorial Lit</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 2rem;
        background: #1a1a2e;
        color: #eee;
      }
    </style>
  </head>
  <body>
    <h1>02 — Primer componente</h1>

    <!-- Uso del componente: igual que en Stencil, es un custom element -->
    <my-greeting></my-greeting>

    <hr style="margin: 1rem 0; border-color: #333;" />

    <!-- Pasando una propiedad via atributo (como en Stencil) -->
    <my-greeting name="Lit"></my-greeting>

    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
